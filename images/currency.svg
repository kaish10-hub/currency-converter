<svg xmlns="http://www.w3.org/2000/svg"
     width="100"
     height="100"
     viewBox="0 0 100 100"
     fill="none">

    <!-- Globe -->
    <circle cx="50" cy="50" r="28"
            stroke="#2563EB"
            stroke-width="3"/>

    <ellipse cx="50" cy="50" rx="12" ry="28"
             stroke="#2563EB"
             stroke-width="2"/>

    <path d="M22 50H78" stroke="#2563EB" stroke-width="2"/>
    <path d="M26 38H74" stroke="#2563EB" stroke-width="2"/>
    <path d="M26 62H74" stroke="#2563EB" stroke-width="2"/>

    <!-- Dollar Coin -->
    <circle cx="25" cy="68" r="12"
            fill="#3B82F6"/>

    <text x="25"
          y="73"
          text-anchor="middle"
          font-size="15"
          font-weight="bold"
          fill="white">$</text>

    <!-- Rupee Coin -->
    <circle cx="75" cy="68" r="12"
            fill="#2563EB"/>

    <text x="75"
          y="73"
          text-anchor="middle"
          font-size="13"
          font-weight="bold"
          fill="white">₹</text>

</svg>